name: Regenerate Tour de France ICS

on:
  push:
    branches: ["main"]
    paths:
      - "tour-de-france-2026.json"
      - "generate_ics.py"
      - ".github/workflows/regenerate-ics.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate ICS
        run: python3 generate_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tour-de-france-2026.ics
          if git diff --cached --quiet; then
            echo "No ICS changes"
            exit 0
          fi
          git commit -m "chore: regenerate ICS from JSON"
          git push
